<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador de Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0d0f14;--surface:#161921;--surface2:#1e2230;--border:#2a2f3e;--accent:#5b8cff;--accent2:#a78bfa;--accent3:#34d399;--danger:#f87171;--text:#e8eaf0;--muted:#6b7280;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:16px;}
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(91,140,255,.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;bottom:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(167,139,250,.06) 0%,transparent 70%);pointer-events:none;z-index:0;}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:rgba(13,15,20,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;}
  .header-top{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;}
  .header-bottom{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:8px;padding-bottom:10px;flex-wrap:wrap;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .stat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .stat-pill b{color:var(--text);font-weight:700;}
  .stat-pill .sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .stat-divider{width:1px;height:16px;background:var(--border);flex-shrink:0;}
  .sync-indicator{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--muted);margin-left:auto;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0;}
  .sync-dot.ok{background:#34d399;}.sync-dot.busy{background:#f59e0b;animation:blink 1s infinite;}.sync-dot.error{background:#f87171;}
  @media(max-width:600px){.header-bottom{gap:6px;padding-bottom:8px;}.stat-pill{font-size:.72rem;padding:3px 9px;}.stat-divider{display:none;}}

  /* MAIN */
  main{max-width:1100px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1;}
  .page-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;letter-spacing:-1px;margin-bottom:6px;}
  .page-sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
  .btn-add-parent{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:.875rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:28px;box-shadow:0 4px 20px rgba(91,140,255,.25);}
  .btn-add-parent:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(91,140,255,.35);}

  /* TASK CARD */
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;transition:border-color .2s;animation:slideIn .3s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .task-card:hover{border-color:rgba(91,140,255,.28);}
  .p-critical{border-left:5px solid #f87171!important;}.p-high{border-left:5px solid #f59e0b!important;}.p-medium{border-left:5px solid #5b8cff!important;}.p-low{border-left:5px solid #34d399!important;}

  /* PARENT HEADER */
  .parent-header{display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
  .collapse-btn{width:28px;height:28px;background:var(--surface2);border:1px solid rgba(52,211,153,.5);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#34d399;transition:all .2s;flex-shrink:0;margin-top:2px;}
  .collapse-btn svg{transition:transform .25s;}
  .collapsed .collapse-btn svg{transform:rotate(-90deg);}
  .parent-info{min-width:0;}
  .parent-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
  .parent-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .date-tag{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--muted);white-space:nowrap;}
  .date-tag svg{width:11px;height:11px;flex-shrink:0;}

  /* PARENT STATE BADGE */
  .parent-state-badge{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:4px 10px;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.2px;flex-shrink:0;white-space:nowrap;}
  .parent-state-badge .bk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .psb-none{background:rgba(107,114,128,.13);color:var(--muted);border:1px solid rgba(107,114,128,.22);}
  .psb-none .bk-dot{background:var(--muted);}
  .psb-progress{background:rgba(91,140,255,.13);color:#5b8cff;border:1px solid rgba(91,140,255,.28);}
  .psb-progress .bk-dot{background:#5b8cff;box-shadow:0 0 6px #5b8cff;animation:blink 1.6s infinite;}
  .psb-done{background:rgba(52,211,153,.13);color:#34d399;border:1px solid rgba(52,211,153,.28);}
  .psb-done .bk-dot{background:#34d399;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

  /* PARENT RIGHT — stacks badge on top, actions below on mobile */
  .parent-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
  .parent-actions{display:flex;gap:5px;}

  /* PROGRESS BAR */
  .parent-progress-section{padding:0 16px 12px;display:flex;align-items:center;gap:10px;}
  .progress-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
  .progress-label{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;min-width:28px;text-align:right;flex-shrink:0;}
  .btn-icon{width:30px;height:30px;background:transparent;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;}
  .btn-icon:hover{background:var(--surface2);color:var(--text);}
  .btn-icon.del:hover{border-color:var(--danger);color:var(--danger);}
  .btn-icon.comment-active{border-color:var(--accent2);color:var(--accent2);background:rgba(167,139,250,.1);}

  /* COMMENT BADGE ON ICON */
  .comment-badge{position:absolute;top:-6px;right:-6px;background:var(--accent2);color:#fff;border-radius:10px;font-size:.62rem;font-weight:700;font-family:'Syne',sans-serif;min-width:16px;height:16px;padding:0 4px;display:flex;align-items:center;justify-content:center;line-height:1;border:2px solid var(--surface);}

  /* SUBTASKS */
  .subtasks-wrap{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;}
  .collapsed .subtasks-wrap{display:none;}
  .subtask-row{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:slideIn .22s ease;transition:border-color .15s;}
  .subtask-row:hover{border-color:rgba(91,140,255,.22);}
  .subtask-row-inner{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;padding:12px 14px;}
  .subtask-left{min-width:0;}
  .subtask-name{font-size:.875rem;font-weight:500;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .subtask-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:9px;}

  /* STATE PILL */
  .state-pill{display:inline-flex;align-items:center;gap:6px;border-radius:7px;padding:4px 11px;font-size:.78rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity .15s;user-select:none;}
  .state-pill:hover{opacity:.8;}
  .state-pill .sp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .sp-none{background:rgba(107,114,128,.12);color:var(--muted);border:1px solid rgba(107,114,128,.2);}
  .sp-none .sp-dot{background:var(--muted);}
  .sp-progress{background:rgba(91,140,255,.12);color:#5b8cff;border:1px solid rgba(91,140,255,.25);}
  .sp-progress .sp-dot{background:#5b8cff;box-shadow:0 0 5px #5b8cff;animation:blink 1.6s infinite;}
  .sp-done{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25);}
  .sp-done .sp-dot{background:#34d399;}
  .subtask-right{display:flex;gap:5px;flex-shrink:0;margin-top:2px;}

  /* PRIORITY BADGE */
  .priority-badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:3px 9px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
  .pb-critical{background:rgba(248,113,113,.13);color:#f87171;border:1px solid rgba(248,113,113,.22);}
  .pb-high{background:rgba(245,158,11,.13);color:#f59e0b;border:1px solid rgba(245,158,11,.22);}
  .pb-medium{background:rgba(91,140,255,.13);color:#5b8cff;border:1px solid rgba(91,140,255,.22);}
  .pb-low{background:rgba(52,211,153,.13);color:#34d399;border:1px solid rgba(52,211,153,.22);}

  /* ADD SUBTASK */
  .btn-add-sub{display:flex;align-items:center;gap:7px;background:transparent;border:1px dashed rgba(255,255,255,.6);border-radius:8px;color:#fff;padding:9px 14px;font-size:.875rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;width:100%;margin-top:2px;font-weight:500;}
  .btn-add-sub:hover{border-color:#fff;background:rgba(255,255,255,.05);}

  /* COMMENT TOGGLE BTN (subtask) */
  .btn-comment-toggle{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;position:relative;}
  .btn-comment-toggle:hover{color:var(--accent2);border-color:var(--accent2);}
  .btn-comment-toggle.has-comments{color:var(--accent2);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.07);}
  .sub-comment-badge{position:absolute;top:-7px;right:-7px;background:var(--accent2);color:#fff;border-radius:10px;font-size:.6rem;font-weight:700;font-family:'Syne',sans-serif;min-width:15px;height:15px;padding:0 3px;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface2);}

  /* COMMENTS PANEL */
  .comments-panel{border-top:2px solid rgba(167,139,250,.4);background:rgba(167,139,250,.06);overflow:hidden;max-height:0;transition:max-height .35s ease;}
  .sub-comments-panel{border-top:1px solid rgba(255,255,255,.05);background:rgba(13,15,20,.4);overflow:hidden;max-height:0;transition:max-height .35s ease;}
  .comments-inner{padding:16px 20px 20px;}
  .sub-comments-inner{padding:10px 14px 14px;}
  .comments-title{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
  .comments-title svg{width:14px;height:14px;stroke:var(--accent2);}
  .comments-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}

  /* COMMENT ITEM */
  .comment-item{border:1px solid var(--border);border-radius:10px;padding:12px 14px;animation:slideIn .2s ease;}
  .comments-panel .comment-item{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.2);}
  .sub-comments-panel .comment-item{background:var(--surface2);border-color:var(--border);}
  .comment-item.editing{border-color:var(--accent2);background:rgba(167,139,250,.15);}
  .comment-body{font-size:.85rem;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
  .comment-edit-area{width:100%;background:var(--bg);border:1px solid var(--accent2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;resize:none;outline:none;line-height:1.5;min-height:60px;}
  .comment-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .comment-date{font-size:.72rem;color:var(--muted);}
  .comment-actions{display:flex;gap:6px;align-items:center;}
  .btn-comment-action{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:.75rem;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:4px;}
  .btn-comment-action:hover{color:var(--text);border-color:var(--text);}
  .btn-comment-action.save{color:var(--accent2);border-color:rgba(167,139,250,.3);}
  .btn-comment-action.save:hover{background:rgba(167,139,250,.1);}
  .btn-comment-action.del:hover{color:var(--danger);border-color:var(--danger);}

  /* COMMENT INPUT */
  .comment-empty{font-size:.82rem;color:var(--muted);font-style:italic;text-align:center;padding:10px 0;}
  .comment-input-row{display:flex;gap:8px;align-items:flex-end;}
  .comment-textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;resize:none;outline:none;transition:border-color .15s;min-height:60px;max-height:120px;line-height:1.5;}
  .comment-textarea:focus{border-color:var(--accent2);}
  .comment-textarea::placeholder{color:var(--muted);}
  .btn-comment-send{background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:8px;padding:10px 16px;color:#fff;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;flex-shrink:0;box-shadow:0 3px 12px rgba(167,139,250,.3);}
  .btn-comment-send:hover{box-shadow:0 5px 18px rgba(167,139,250,.5);}
  .btn-comment-send:disabled{opacity:.4;cursor:not-allowed;}

  /* LOADING */
  .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
  .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:var(--muted);font-size:1.05rem;}

  /* TOAST */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 20px;font-size:.82rem;font-weight:500;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.4);transition:transform .3s ease;z-index:500;white-space:nowrap;display:flex;align-items:center;gap:8px;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:480px;padding:28px;transform:scale(.96);transition:transform .2s;box-shadow:0 24px 80px rgba(0,0,0,.5);}
  .modal-overlay.open .modal{transform:scale(1);}
  @media(max-width:540px){.modal{padding:20px 16px;border-radius:14px;}}
  .modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:10px;}
  .parent-ref{display:flex;align-items:center;gap:7px;background:rgba(91,140,255,.08);border:1px solid rgba(91,140,255,.2);border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:.875rem;color:var(--muted);font-weight:600;}
  .parent-ref svg{flex-shrink:0;stroke:var(--accent);width:14px;height:14px;}
  .parent-ref b{color:var(--accent);font-weight:700;font-size:1.05rem;}
  .form-row{margin-bottom:20px;}
  .form-row label{display:block;font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:500;}
  .form-row input,.form-row select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;outline:none;transition:border-color .15s;display:block;}
  .date-row{display:flex;gap:12px;}
  .date-row .form-row{width:50%;flex:none;}
  .form-row input[type="date"]{appearance:none;-webkit-appearance:none;cursor:pointer;width:100%;height:42px;min-height:42px;padding:0 13px;line-height:42px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;outline:none;transition:border-color .15s;display:block;box-sizing:border-box;}
  .form-row input[type="date"]:focus,.form-row input:focus,.form-row select:focus{border-color:var(--accent);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}
  .btn-cancel{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);border-radius:8px;padding:9px 18px;color:#f87171;font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer;transition:all .15s;}
  .btn-cancel:hover{background:rgba(248,113,113,.25);border-color:#f87171;}
  .btn-save{background:linear-gradient(135deg,#059669,#047857);border:none;border-radius:8px;padding:9px 22px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(5,150,105,.3);}
  .btn-save:hover{box-shadow:0 6px 20px rgba(5,150,105,.5);}
  .btn-save:disabled{opacity:.5;cursor:not-allowed;}

  /* EMPTY */
  .empty-state{text-align:center;padding:70px 20px;}
  .empty-icon{font-size:3rem;margin-bottom:14px;opacity:.5;}
  .empty-state h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:6px;}
  .empty-state p{color:var(--muted);font-size:1.05rem;}

  /* FAB */
  .fab{position:fixed;bottom:28px;right:28px;z-index:150;display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:50px;padding:14px 22px;font-size:.875rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 6px 24px rgba(91,140,255,.45);transform:translateY(100px) scale(0.8);opacity:0;pointer-events:none;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .25s ease;}
  .fab.visible{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
  .fab:hover{box-shadow:0 10px 32px rgba(91,140,255,.6);transform:translateY(-2px) scale(1);}
  @media(max-width:600px){.fab{bottom:20px;right:16px;padding:13px 18px;font-size:.92rem;}}

  ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  @media(max-width:600px){
    .parent-header{gap:8px;padding:12px 12px;}
    .subtasks-wrap{padding:0 10px 12px;}
    .subtask-row-inner{grid-template-columns:1fr;}
    .subtask-right{justify-content:flex-end;}
    .sync-indicator span{display:none;}
    .parent-name{font-size:.9rem;}
    .btn-icon{width:28px;height:28px;}
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Conectando con Supabase...</div>
</div>

<header>
  <div class="header-top">
    <div class="logo">⬡ TaskPlanner</div>
    <div class="sync-indicator"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">—</span></div>
  </div>
  <div class="header-bottom">
    <div class="stat-pill">📁 Proyectos <b id="statParents">0</b></div>
    <div class="stat-divider"></div>
    <div class="stat-pill"><span class="sdot" style="background:var(--muted)"></span>Sin iniciar <b id="statNone">0</b></div>
    <div class="stat-pill"><span class="sdot" style="background:#5b8cff;box-shadow:0 0 4px #5b8cff"></span>En progreso <b id="statProg">0</b></div>
    <div class="stat-pill"><span class="sdot" style="background:#34d399"></span>Terminadas <b id="statDone">0</b></div>
  </div>
</header>

<main>
  <div class="page-title">Planificador</div>
  <p class="page-sub">Datos sincronizados en tiempo real con Supabase.</p>
  <button class="btn-add-parent" onclick="openModal('parent')">

<script>
const SUPABASE_URL='https://icrngsqnbzxefclcoyvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljcm5nc3FuYnp4ZWZjbGNveXZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjAyNzAsImV4cCI6MjA5NTkzNjI3MH0.Me7SRoFb18bcSlVy5OxrfMyihQDKHSzRwQgMrd0gfP8';
const{createClient}=supabase;

const COLORS={'p-critical':'#f87171','p-high':'#f59e0b','p-medium':'#5b8cff','p-low':'#34d399'};
const PRIORITY={'p-critical':{label:'Crítica',cls:'pb-critical'},'p-high':{label:'Alta',cls:'pb-high'},'p-medium':{label:'Media',cls:'pb-medium'},'p-low':{label:'Baja',cls:'pb-low'}};
const STATE={'none':{label:'No iniciada',cls:'sp-none',bcls:'psb-none'},'progress':{label:'En progreso',cls:'sp-progress',bcls:'psb-progress'},'done':{label:'Terminada',cls:'sp-done',bcls:'psb-done'}};
const STATE_ORDER=['none','progress','done'];

let tasks=[], comments={}, modalMode='parent', editTarget={};

function syncState(s,l){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncLabel').textContent=l;}

async function loadAll(){
  syncState('busy','Cargando...');
  try{
    const{data:tareas,error:e1}=await db.from('tareas').select('*').order('created_at');
    if(e1)throw e1;
    const{data:subtareas,error:e2}=await db.from('subtareas').select('*').order('position').order('created_at');
    if(e2)throw e2;
    const{data:coms,error:e3}=await db.from('comentarios').select('*').order('created_at');
    if(e3)throw e3;
    tasks=tareas.map(t=>({...t,subs:subtareas.filter(s=>s.tarea_id===t.id)}));
    comments={};
    (coms||[]).forEach(c=>{if(!comments[c.ref_id])comments[c.ref_id]=[];comments[c.ref_id].push(c);});
    render();updateStats();syncState('ok','Sincronizado');
  }catch(err){syncState('error','Error de conexión');showToast('❌ '+(err.message||err));}
  finally{document.getElementById('loadingScreen').style.display='none';}
}

function deriveParentState(task){
  const s=task.subs||[];if(!s.length)return'none';
  const done=s.filter(x=>x.state==='done').length,prog=s.filter(x=>x.state==='progress').length;
  if(done===s.length)return'done';if(done>0||prog>0)return'progress';return'none';
}

/* ── COMMENT ITEM HTML ── */
function commentItemHtml(c){
  return`<div class="comment-item" id="ci-${c.id}">
    <div class="comment-body" id="cb-${c.id}">${esc(c.body)}</div>
    <textarea class="comment-edit-area" id="cea-${c.id}" style="display:none">${esc(c.body)}</textarea>
    <div class="comment-footer">
      <span class="comment-date">${fmtDateTime(c.created_at)}</span>
      <div class="comment-actions">
        <button class="btn-comment-action" id="cedit-${c.id}" onclick="startEditComment('${c.id}',event)">
          <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Editar
        </button>
        <button class="btn-comment-action save" id="csave-${c.id}" style="display:none" onclick="saveEditComment('${c.id}',event)">✓ Guardar</button>
        <button class="btn-comment-action" id="ccancel-${c.id}" style="display:none" onclick="cancelEditComment('${c.id}',event)">✕ Cancelar</button>
        <button class="btn-comment-action del" onclick="deleteComment('${c.id}',event)">
          <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          Eliminar
        </button>
      </div>
    </div>
  </div>`;
}

/* ── RENDER ── */
function render(){
  const container=document.getElementById('tasksContainer');
  const open=new Set(JSON.parse(localStorage.getItem('tp_open')||'[]'));
  tasks.forEach(t=>{if(t._collapsed){open.delete(t.id);delete t._collapsed;}});
  const collapsed=id=>!open.has(id);
  if(!tasks.length){container.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><h3>Sin proyectos aún</h3><p>Crea tu primera tarea principal para comenzar.</p></div>`;return;}

  container.innerHTML=tasks.map((t,ti)=>{
    const pKey=t.color||'p-medium',color=COLORS[pKey],pInfo=PRIORITY[pKey];
    const pSt=deriveParentState(t),pSI=STATE[pSt];
    const subs=t.subs||[],total=subs.length,done=subs.filter(s=>s.state==='done').length;
    const barPct=total?Math.round(done/total*100):0;
    const tComs=comments[t.id]||[],tCount=tComs.length;
    const tComHtml=tComs.map(c=>commentItemHtml(c)).join('');

    const subsHtml=subs.map((s,si)=>{
      const sState=s.state||'none',sSI=STATE[sState],sKey=s.color||pKey,sPInfo=PRIORITY[sKey];
      const fd=fmtDate(s.start_date),ed=fmtDate(s.end_date);
      const sComs=comments[s.id]||[],sCount=sComs.length;
      const sComHtml=sComs.map(c=>commentItemHtml(c)).join('');
      return`<div class="subtask-row">
        <div class="subtask-row-inner">
          <div class="subtask-left">
            <div class="subtask-name">${esc(s.name)}</div>
            <div class="subtask-meta">
              ${fd||ed?`<span class="date-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fd||''}${fd&&ed?' → ':''}${ed||''}</span>`:''}
              <span class="priority-badge ${sPInfo.cls}">${sPInfo.label}</span>
              <button class="btn-comment-toggle${sCount>0?' has-comments':''}" onclick="toggleComments('sub-${s.id}',event)">
                <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                ${sCount>0?sCount+' comentario'+(sCount>1?'s':''):'Comentar'}
                ${sCount>0?`<span class="sub-comment-badge">${sCount}</span>`:''}
              </button>
            </div>
            <span class="state-pill ${sSI.cls}" title="Clic para cambiar estado" onclick="cycleState(${ti},${si},event)">
              <span class="sp-dot"></span>${sSI.label}
            </span>
          </div>
          <div class="subtask-right">
            <button class="btn-icon" onclick="openModal('sub',${ti},${si})"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="btn-icon del" onclick="deleteSub(${ti},${si})"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
        </div>
        <div class="sub-comments-panel" id="sub-${s.id}">
          <div class="sub-comments-inner">
            <div class="comments-list" id="cl-sub-${s.id}">${sComHtml||`<div class="comment-empty">Sin comentarios aún</div>`}</div>
            <div class="comment-input-row">
              <textarea class="comment-textarea" id="ctxt-subtarea-${s.id}" placeholder="Escribe un comentario..." rows="2"></textarea>
              <button class="btn-comment-send" onclick="addComment('${s.id}','subtarea',event)">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Enviar
              </button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    return`<div class="task-card ${pKey}${collapsed(t.id)?' collapsed':''}" id="card-${ti}" data-task-id="${t.id}">
      <div class="parent-header" onclick="toggleCollapse(${ti})">
        <div class="collapse-btn"><svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>
        <div class="parent-info">
          <div class="parent-name">${esc(t.name)}</div>
          <div class="parent-meta">
            ${t.start_date||t.end_date?`<span class="date-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtDate(t.start_date)||'—'}${t.end_date?' → '+fmtDate(t.end_date):''}</span>`:''}
            <span class="priority-badge ${pInfo.cls}">${pInfo.label}</span>
            <span class="date-tag">${total} subtarea${total!==1?'s':''} · ${done} terminada${done!==1?'s':''}</span>
          </div>
        </div>
        <div class="parent-right" onclick="event.stopPropagation()">
          <span class="parent-state-badge ${pSI.bcls}"><span class="bk-dot"></span>${pSI.label}</span>
          <div class="parent-actions">
            <button class="btn-icon${tCount>0?' comment-active':''}" title="Comentarios" onclick="toggleComments('tarea-${t.id}',event)">
              <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              ${tCount>0?`<span class="comment-badge">${tCount}</span>`:''}
            </button>
            <button class="btn-icon" onclick="openModal('editParent',${ti})"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="btn-icon del" onclick="deleteParent(${ti})"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
        </div>
      </div>
      <div class="parent-progress-section">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${barPct}%;background:${color}"></div></div>
        <div class="progress-label" style="color:${color}">${barPct}%</div>
      </div>
      <div class="comments-panel" id="tarea-${t.id}">
        <div class="comments-inner">
          <div class="comments-title"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Comentarios${tCount>0?' ('+tCount+')':''}</div>
          <div class="comments-list" id="cl-tarea-${t.id}">${tComHtml||`<div class="comment-empty">Sin comentarios aún</div>`}</div>
          <div class="comment-input-row">
            <textarea class="comment-textarea" id="ctxt-tarea-${t.id}" placeholder="Escribe un comentario sobre este proyecto..." rows="2"></textarea>
            <button class="btn-comment-send" onclick="addComment('${t.id}','tarea',event)">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Enviar
            </button>
          </div>
        </div>
      </div>
      <div class="subtasks-wrap">
        ${subsHtml}
        <button class="btn-add-sub" onclick="openModal('sub',${ti})">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar subtarea
        </button>
      </div>
    </div>`;
  }).join('');
}

function updateStats(){
  let none=0,prog=0,done=0;
  tasks.forEach(t=>{(t.subs||[]).forEach(s=>{if(s.state==='done')done++;else if(s.state==='progress')prog++;else none++;});});
  document.getElementById('statParents').textContent=tasks.length;
  document.getElementById('statNone').textContent=none;
  document.getElementById('statProg').textContent=prog;
  document.getElementById('statDone').textContent=done;
}

/* ── TOGGLE PANEL ── */
function toggleComments(panelId,e){
  if(e)e.stopPropagation();
  const panel=document.getElementById(panelId);
  if(!panel)return;
  const isOpen=panel.style.maxHeight&&panel.style.maxHeight!=='0px';
  if(isOpen){
    panel.style.maxHeight='0';
  }else{
    panel.style.maxHeight='800px';
    const ta=panel.querySelector('.comment-textarea');
    if(ta)setTimeout(()=>ta.focus(),350);
  }
}

/* ── ADD COMMENT ── */
async function addComment(refId,refType,e){
  e.stopPropagation();
  const ta=document.getElementById(`ctxt-${refType}-${refId}`);
  const body=(ta?ta.value:'').trim();
  if(!body)return;
  const btn=e.target.closest('button');
  btn.disabled=true;
  syncState('busy','Guardando...');
  const{data,error}=await db.from('comentarios').insert({ref_id:refId,ref_type:refType,body}).select().single();
  if(error){syncState('error','Error');showToast('❌ '+error.message);btn.disabled=false;return;}
  if(!comments[refId])comments[refId]=[];
  comments[refId].push(data);
  ta.value='';
  const panelId=refType==='tarea'?`tarea-${refId}`:`sub-${refId}`;
  render();updateStats();syncState('ok','Sincronizado');
  setTimeout(()=>{const p=document.getElementById(panelId);if(p)p.style.maxHeight='800px';},30);
  showToast('💬 Comentario agregado');
  btn.disabled=false;
}

/* ── EDIT COMMENT ── */
function startEditComment(commentId,e){
  e.stopPropagation();
  document.getElementById(`cb-${commentId}`).style.display='none';
  document.getElementById(`cea-${commentId}`).style.display='block';
  document.getElementById(`cedit-${commentId}`).style.display='none';
  document.getElementById(`csave-${commentId}`).style.display='inline-flex';
  document.getElementById(`ccancel-${commentId}`).style.display='inline-flex';
  document.getElementById(`ci-${commentId}`).classList.add('editing');
  const ta=document.getElementById(`cea-${commentId}`);
  ta.focus();ta.selectionStart=ta.value.length;
}
function cancelEditComment(commentId,e){
  e.stopPropagation();
  document.getElementById(`cb-${commentId}`).style.display='block';
  document.getElementById(`cea-${commentId}`).style.display='none';
  document.getElementById(`cedit-${commentId}`).style.display='inline-flex';
  document.getElementById(`csave-${commentId}`).style.display='none';
  document.getElementById(`ccancel-${commentId}`).style.display='none';
  document.getElementById(`ci-${commentId}`).classList.remove('editing');
}
async function saveEditComment(commentId,e){
  e.stopPropagation();
  const ta=document.getElementById(`cea-${commentId}`);
  const body=ta.value.trim();
  if(!body)return;
  const btn=e.target.closest('button');
  btn.disabled=true;btn.textContent='Guardando...';
  syncState('busy','Guardando...');
  const{error}=await db.from('comentarios').update({body}).eq('id',commentId);
  if(error){syncState('error','Error');showToast('❌ '+error.message);btn.disabled=false;btn.textContent='✓ Guardar';return;}
  // Update local cache
  for(const key in comments){
    const c=comments[key].find(x=>x.id===commentId);
    if(c){c.body=body;break;}
  }
  // Keep panel open after re-render
  const panel=ta.closest('.comments-panel,.sub-comments-panel');
  const panelId=panel?panel.id:null;
  render();updateStats();syncState('ok','Sincronizado');
  if(panelId)setTimeout(()=>{const p=document.getElementById(panelId);if(p)p.style.maxHeight='800px';},30);
  showToast('✏️ Comentario editado');
}

/* ── DELETE COMMENT ── */
async function deleteComment(commentId,e){
  e.stopPropagation();
  if(!confirm('¿Eliminar este comentario?'))return;
  const panel=e.target.closest('.comments-panel,.sub-comments-panel');
  const panelId=panel?panel.id:null;
  syncState('busy','Eliminando...');
  const{error}=await db.from('comentarios').delete().eq('id',commentId);
  if(error){syncState('error','Error');showToast('❌ '+error.message);return;}
  for(const key in comments){comments[key]=comments[key].filter(c=>c.id!==commentId);}
  render();updateStats();syncState('ok','Sincronizado');
  if(panelId)setTimeout(()=>{const p=document.getElementById(panelId);if(p)p.style.maxHeight='800px';},30);
  showToast('🗑 Comentario eliminado');
}

/* ── CYCLE STATE ── */
async function cycleState(ti,si,e){
  e.stopPropagation();
  const s=tasks[ti].subs[si];
  const newState=STATE_ORDER[(STATE_ORDER.indexOf(s.state||'none')+1)%STATE_ORDER.length];
  syncState('busy','Guardando...');
  const{error}=await db.from('subtareas').update({state:newState}).eq('id',s.id);
  if(error){syncState('error','Error');showToast('❌ '+error.message);return;}
  s.state=newState;render();updateStats();syncState('ok','Sincronizado');
  showToast(newState==='done'?'✅ Terminada':newState==='progress'?'🔄 En progreso':'⬜ Reiniciada');
  if(tasks[ti].subs.every(x=>x.state==='done')&&tasks[ti].subs.length>0)setTimeout(()=>showToast('🎉 ¡Proyecto completado!'),700);
}

/* ── HELPERS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${parseInt(day)} ${'ene feb mar abr may jun jul ago sep oct nov dic'.split(' ')[parseInt(m)-1]} ${y}`;}
function fmtDateTime(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});}
function toggleCollapse(ti){
  const card=document.getElementById('card-'+ti);card.classList.toggle('collapsed');
  const id=card.dataset.taskId;
  const open=JSON.parse(localStorage.getItem('tp_open')||'[]');
  if(card.classList.contains('collapsed')){localStorage.setItem('tp_open',JSON.stringify(open.filter(x=>x!==id)));}
  else{if(!open.includes(id))open.push(id);localStorage.setItem('tp_open',JSON.stringify(open));}
}
let toastT;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ── MODAL ── */
function openModal(mode,ti,si){
  modalMode=mode;editTarget={ti,si};
  const title=document.getElementById('modalTitle');
  document.getElementById('fName').value='';document.getElementById('fName').placeholder='Ej: Planificación semestre';document.getElementById('fStart').value='';document.getElementById('fEnd').value='';
  document.getElementById('fColor').value='p-medium';document.getElementById('fState').value='none';
  document.getElementById('stateRow').style.display='none';document.getElementById('parentRef').style.display='none';
  if(mode==='parent'){title.textContent='✦ Nueva Tarea Principal';}
  else if(mode==='editParent'){
    const t=tasks[ti];title.textContent='Editar Tarea Principal';
    document.getElementById('fName').value=t.name;document.getElementById('fStart').value=t.start_date||'';
    document.getElementById('fEnd').value=t.end_date||'';document.getElementById('fColor').value=t.color||'p-medium';
  }else if(mode==='sub'){
    document.getElementById('stateRow').style.display='block';
    document.getElementById('parentRefName').textContent=tasks[ti].name;
    document.getElementById('parentRef').style.display='flex';
    const parentName=tasks[ti].name;
    document.getElementById('fName').placeholder=`Ej: Tarea de ${parentName}`;
    if(si!==undefined){
      const s=tasks[ti].subs[si];title.textContent='Editar Subtarea';
      document.getElementById('fName').value=s.name;document.getElementById('fStart').value=s.start_date||'';
      document.getElementById('fEnd').value=s.end_date||'';document.getElementById('fColor').value=s.color||'p-medium';
      document.getElementById('fState').value=s.state||'none';
    }else{title.textContent='+ Nueva Subtarea';}
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),180);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('open'))
    if(document.activeElement.tagName!=='BUTTON'&&document.activeElement.tagName!=='TEXTAREA')saveTask();
});
/* ── SAVE TASK ── */
async function saveTask(){
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('fName').focus();return;}
  const start=document.getElementById('fStart').value||null,end=document.getElementById('fEnd').value||null;
  const color=document.getElementById('fColor').value,state=document.getElementById('fState').value||'none';
  const btn=document.getElementById('btnSave');btn.disabled=true;btn.textContent='Guardando...';
  syncState('busy','Guardando...');
  try{
    if(modalMode==='parent'){
      const{data,error}=await db.from('tareas').insert({name,start_date:start,end_date:end,color}).select().single();
      if(error)throw error;
      tasks.forEach(t=>t._collapsed=true);localStorage.setItem('tp_open',JSON.stringify([data.id]));
      tasks.push({...data,subs:[]});showToast('📁 Proyecto creado');
      setTimeout(()=>{const card=document.getElementById('card-'+(tasks.length-1));if(card)card.scrollIntoView({behavior:'smooth',block:'center'});},100);
    }else if(modalMode==='editParent'){
      const t=tasks[editTarget.ti];
      const{error}=await db.from('tareas').update({name,start_date:start,end_date:end,color}).eq('id',t.id);
      if(error)throw error;
      Object.assign(t,{name,start_date:start,end_date:end,color});showToast('✏️ Proyecto actualizado');
    }else if(modalMode==='sub'){
      const t=tasks[editTarget.ti];
      if(editTarget.si!==undefined){
        const s=t.subs[editTarget.si];
        const{error}=await db.from('subtareas').update({name,start_date:start,end_date:end,color,state}).eq('id',s.id);
        if(error)throw error;
        Object.assign(s,{name,start_date:start,end_date:end,color,state});showToast('✏️ Subtarea actualizada');
      }else{
        const{data,error}=await db.from('subtareas').insert({tarea_id:t.id,name,start_date:start,end_date:end,color,state,position:t.subs.length}).select().single();
        if(error)throw error;
        t.subs.push(data);showToast('➕ Subtarea agregada');
        if(t.subs.every(s=>s.state==='done')&&t.subs.length>0)setTimeout(()=>showToast('🎉 ¡Proyecto completado!'),700);
      }
    }
    render();updateStats();syncState('ok','Sincronizado');closeModal();
  }catch(err){syncState('error','Error');showToast('❌ '+(err.message||'Error desconocido'));}
  finally{btn.disabled=false;btn.textContent='Guardar';}
}

/* ── DELETE ── */
async function deleteParent(ti){
  if(!confirm('¿Eliminar este proyecto y todas sus subtareas?'))return;
  const t=tasks[ti];syncState('busy','Eliminando...');
  const{error}=await db.from('tareas').delete().eq('id',t.id);
  if(error){syncState('error','Error');showToast('❌ '+error.message);return;}
  tasks.splice(ti,1);render();updateStats();syncState('ok','Sincronizado');showToast('🗑 Proyecto eliminado');
}
async function deleteSub(ti,si){
  if(!confirm('¿Eliminar esta subtarea?'))return;
  const s=tasks[ti].subs[si];syncState('busy','Eliminando...');
  const{error}=await db.from('subtareas').delete().eq('id',s.id);
  if(error){syncState('error','Error');showToast('❌ '+error.message);return;}
  tasks[ti].subs.splice(si,1);render();updateStats();syncState('ok','Sincronizado');showToast('🗑 Subtarea eliminada');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('open'))
    if(document.activeElement.tagName!=='BUTTON'&&document.activeElement.tagName!=='TEXTAREA')saveTask();
});

new IntersectionObserver(([entry])=>document.getElementById('fab').classList.toggle('visible',!entry.isIntersecting),{threshold:0}).observe(document.querySelector('.btn-add-parent'));

loadAll();
</script>
